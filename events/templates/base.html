<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Bookking System</title>
    <link href="http://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'stylesheet.css'%}">
</head>
<body class="bg-light">
    <nav class="navbar navbar=expand-lg navbar-drak bg-primary mb-4">
        <idv class="container">
            <a class="navbar-brand" href="{% url 'event_list' %}">EventBooking</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-navms-auto">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'signup' %}">Signup</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </idv>
    </nav>
    <div class="container">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert" alert-info>{{msg}}</div>
        {% endfor %}
        {% endif %}
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist?js?bootstrap.bundle.min.js"></scriptsrc>
    </script>
</body>
</html>
