{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets - {{event.title}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstarp@5..3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'stylesheet.css'%}">
    <style>
        body{
            background: #f5f5f5;
        }
        .event-box{
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 10px
            rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold"
            href="{% url 'event_list' %}">EventBooking</a>
        </div>
    </nav>
    <div class="containee mt-4"> 
        <h2 class="fw-bold text-center mb-4>Book Tickets"></h2>
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="event-box">
                    <h5 class="fw-bold">{{event.title}}></h5>
                    <p><strong>Date:</strong>{{ event.date }}</p>
                    <p><strong>Time:</strong>{{event.time}}</p>
                    <p><strong>Location:</strong>{{event.location}}</p>
                    <p><strong>Available Tickets:</strong>{{event.available_tickets}}</p>
                    <p><strong>Price:</strong>₹{{event.price}} per tickets</p>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card shadow-smp-4">
                    <h4 class="fw-bold mb-3">Enter Ticket Details</h4>
                    <form method="post">
                        {% csrf_token %}
                        <label class="form-label">Number of Tickets:</label>
                        <input type="number"name="quantity"class="form-control"min="1"max="{{ event.available_tickets }}"required>
                        <button class="btn btn-success w-100 mt-3">Confirm Booking</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstarp.bundle.min.js"></script>
</body>
</html>
