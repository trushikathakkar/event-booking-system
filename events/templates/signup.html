<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }
        .container{
            width: 350px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
        }
        input{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button{
            widows: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
        }
        a{
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <form method="post">
        {% csrf_token%}
        {{form.as_p}}
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Enter Username" required>
            <input type="email" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Signup</button>
        </form>
    </div>
</body>
</html>
